<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="800"
     height="600">

    <title>Cloudflare SVG Sanitization Test</title>

    <text x="20" y="30" font-size="20">
        Cloudflare SVG URL Test
    </text>

    <!-- Hyperlink -->
    <a href="https://example.com">
        <text x="20" y="70" fill="blue">
            Hyperlink (href)
        </text>
    </a>

    <!-- Legacy hyperlink -->
    <a xlink:href="https://example.com">
        <text x="20" y="100" fill="green">
            Hyperlink (xlink:href)
        </text>
    </a>

    <!-- External image -->
    <image
        href="https://example.com/logo.png"
        x="20"
        y="130"
        width="100"
        height="100" />

    <!-- External image via xlink -->
    <image
        xlink:href="https://example.com/logo.png"
        x="140"
        y="130"
        width="100"
        height="100" />

    <!-- Internal references -->
    <defs>
        <linearGradient id="grad1">
            <stop offset="0%" stop-color="red"/>
            <stop offset="100%" stop-color="blue"/>
        </linearGradient>

        <circle id="testcircle" cx="0" cy="0" r="20"/>
    </defs>

    <rect
        x="20"
        y="260"
        width="200"
        height="80"
        fill="url(#grad1)" />

    <use href="#testcircle" x="300" y="100" />
    <use xlink:href="#testcircle" x="350" y="100" />

    <!-- External SVG reference -->
    <image
        href="https://example.com/test.svg"
        x="20"
        y="380"
        width="120"
        height="120" />

    <!-- Pattern test -->
    <defs>
        <pattern id="mypattern"
                 width="20"
                 height="20"
                 patternUnits="userSpaceOnUse">
            <rect width="20" height="20" fill="lightgray"/>
        </pattern>
    </defs>

    <rect
        x="180"
        y="380"
        width="120"
        height="120"
        fill="url(#mypattern)" />

</svg>
