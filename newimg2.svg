<svg xmlns="http://www.w3.org/2000/svg"
     width="400"
     height="220"
     viewBox="0 0 400 220">

  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <text x="20" y="35" font-family="Arial" font-size="20" font-weight="bold">
    Contact Form
  </text>

  <text x="20" y="70" font-family="Arial" font-size="14">Name:</text>
  <rect x="80" y="55" width="280" height="25" fill="white" stroke="#999"/>

  <text x="20" y="110" font-family="Arial" font-size="14">Email:</text>
  <rect x="80" y="95" width="280" height="25" fill="white" stroke="#999"/>

  <text x="20" y="150" font-family="Arial" font-size="14">Message:</text>
  <rect x="80" y="135" width="280" height="40" fill="white" stroke="#999"/>

  <g onclick="location.assign('https://example.com')" style="cursor:pointer">
    <rect x="150" y="185" width="100" height="30" rx="5" fill="#4CAF50"/>
    <text x="200"
          y="205"
          text-anchor="middle"
          font-family="Arial"
          font-size="14"
          fill="white">
      Submit
    </text>
  </g>

</svg>
