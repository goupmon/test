<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="auto" fill="url(#bg)"/>

  <!-- Decorative stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="80" cy="60" r="2"/>
    <circle cx="180" cy="120" r="1.5"/>
    <circle cx="320" cy="50" r="2"/>
    <circle cx="550" cy="80" r="1.5"/>
    <circle cx="760" cy="110" r="2"/>
    <circle cx="840" cy="60" r="1.5"/>
  </g>

  <!-- Game Logo -->
  <g transform="translate(300,70)">
    <circle cx="150" cy="80" r="70" fill="url(#logoGrad)" filter="url(#glow)"/>

    <!-- Sword -->
    <rect x="145" y="15" width="10" height="95" fill="#ffffff"/>
    <rect x="130" y="95" width="40" height="10" fill="#cbd5e1"/>
    <rect x="142" y="105" width="16" height="20" fill="#fbbf24"/>

    <text x="150"
          y="190"
          text-anchor="middle"
          font-family="Arial"
          font-size="44"
          font-weight="bold"
          fill="#ffffff">
      BATTLE QUEST
    </text>
  </g>

  <!-- Giveaway Panel -->
  <rect x="120" y="260" width="660" height="250" rx="18"
        fill="#111827"
        stroke="#f59e0b"
        stroke-width="3"/>

  <text x="450"
        y="320"
        text-anchor="middle"
        font-family="Arial"
        font-size="48"
        font-weight="bold"
        fill="#fbbf24">
    GAME GIVEAWAY
  </text>

  <text x="450"
        y="370"
        text-anchor="middle"
        font-family="Arial"
        font-size="24"
        fill="#e5e7eb">
    Win a FREE copy of Battle Quest!
  </text>

  <text x="450"
        y="410"
        text-anchor="middle"
        font-family="Arial"
        font-size="22"
        fill="#e5e7eb">
    Multiple winners • Limited time event
  </text>

  <!-- CTA Box -->
  <rect x="180" y="445" width="540" height="50" rx="10"
        fill="#f59e0b"/>

  <text x="450"
        y="478"
        text-anchor="middle"
        font-family="Arial"
        font-size="24"
        font-weight="bold"
        fill="#111827">
    To enter the contest visit:
  </text>

  <text x="450"
        y="535"
        text-anchor="middle"
        font-family="Courier New"
        font-size="26"
        font-weight="bold"
        fill="#60a5fa">
    example.com/contest
  </text>

</svg>
