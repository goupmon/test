<svg xmlns="http://www.w3.org/2000/svg"
     width="900"
     height="600"
     viewBox="0 0 900 600">

  <defs>
    <!-- Animated background gradient -->
    <linearGradient id="bgAnim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff">
        <animate attributeName="stop-color"
                 values="#eef2ff;#e0f2fe;#fce7f3;#eef2ff"
                 dur="8s"
                 repeatCount="indefinite"/>
      </stop>

      <stop offset="50%" stop-color="#ffffff">
        <animate attributeName="stop-color"
                 values="#ffffff;#f0f9ff;#fff7ed;#ffffff"
                 dur="8s"
                 repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#e0f2fe">
        <animate attributeName="stop-color"
                 values="#e0f2fe;#f1f5f9;#fce7f3;#e0f2fe"
                 dur="8s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Floating glow blobs -->
    <radialGradient id="blob1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blob2">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="600" fill="url(#bgAnim)"/>

  <!-- Animated floating blobs -->
  <circle cx="150" cy="120" r="120" fill="url(#blob1)">
    <animate attributeName="cx" values="150;200;150" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;180;120" dur="12s" repeatCount="indefinite"/>
  </circle>

  <circle cx="750" cy="450" r="150" fill="url(#blob2)">
    <animate attributeName="cx" values="750;700;750" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="450;400;450" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- CENTER CONTENT -->
  <g transform="translate(450 300)">

    <!-- Panel -->
    <rect x="-330" y="-180" width="660" height="360" rx="18"
          fill="#ffffff"
          stroke="#111827"
          stroke-width="2"/>

    <!-- Logo -->
    <g transform="translate(0,-120)">
      <circle cx="0" cy="0" r="55"
              fill="url(#logoGrad)"
              filter="url(#glow)"/>

      <rect x="-5" y="-45" width="10" height="70" fill="#111827"/>
      <rect x="-20" y="20" width="40" height="10" fill="#374151"/>
      <rect x="-8" y="30" width="16" height="20" fill="#fbbf24"/>
    </g>

    <!-- Title -->
    <text x="0" y="-20"
          text-anchor="middle"
          font-family="Arial"
          font-size="44"
          font-weight="bold"
          fill="#111827">
      GAME GIVEAWAY
    </text>

    <!-- Subtitle -->
    <text x="0" y="30"
          text-anchor="middle"
          font-family="Arial"
          font-size="22"
          fill="#374151">
      Win a FREE copy of Battle Quest
    </text>

    <text x="0" y="70"
          text-anchor="middle"
          font-family="Arial"
          font-size="20"
          fill="#374151">
      Multiple winners • Limited time event
    </text>

    <!-- CTA -->
    <rect x="-270" y="110" width="540" height="55" rx="10"
          fill="#111827"/>

    <text x="0" y="145"
          text-anchor="middle"
          font-family="Arial"
          font-size="18"
          font-weight="bold"
          fill="white">
      To enter the contest visit: example.com/contest
    </text>

  </g>

</svg>
